<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Threat Intelligence Atlas</title>

  <link rel="stylesheet" href="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css" />
  <script src="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.js"></script>
  
  <!-- Azure Maps Drawing Tools (includes icon templates for HTML markers) -->
  <link href="https://atlas.microsoft.com/sdk/javascript/drawing/1/atlas-drawing.min.css" rel="stylesheet" />
  <script src="https://atlas.microsoft.com/sdk/javascript/drawing/1/atlas-drawing.min.js"></script>

  <link rel="stylesheet" href="./styles/app.css" />
</head>
<body>
  <!--
    App Shell
    This layout uses flexbox so the left panel takes real width.
    The map resizes when the panel opens or closes.
  -->
  <div id="underConstruction" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);color:#fff;z-index:9999;align-items:center;justify-content:center;font-size:2em;text-align:center;flex-direction:column;">
    <div>
      <strong>🚧 Under Construction 🚧</strong><br>
      The map is currently unavailable.<br>
      Please check back later.
    </div>
  </div>
  <div id="appShell" class="app-shell">

    <!-- Left threat details panel (hidden by default) -->
    <aside id="leftPanel" class="left-panel hidden" aria-hidden="true">
      <div class="panel-header">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <h2 id="panelTitle" style="margin: 0;">Threat Details</h2>
          <button id="panelHideBtn" type="button" title="Close panel" style="background: transparent; border: none; color: rgba(255,255,255,0.6); font-size: 20px; padding: 4px 8px; cursor: pointer; line-height: 1; transition: color 0.2s;" onmouseover="this.style.color='rgba(255,255,255,1)'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">✕</button>
        </div>
      </div>

      <!-- Context about the selected region  -->
      <div id="panelMeta" class="panel-meta"></div>

      <!-- List of matching threat actors -->
      <div id="panelList" class="panel-list"></div>
    </aside>

    <!-- Map container -->
    <main id="mapHost" class="map-host">
      <!-- Floating close button for left panel -->
      <button id="floatingPanelCloseBtn" class="floating-panel-close hidden" type="button" title="Close threat details panel">
        ✕ Close Details Panel
      </button>
      
      <!-- Color legend for country view -->
      <div id="countryLegend" class="country-legend hidden">
        <button class="legend-close" onclick="document.getElementById('countryLegend').classList.add('hidden')" title="Close legend">×</button>
        <h4>Threat Actors</h4>
        <div class="legend-item">
          <div class="legend-color" style="background: #0080ff;"></div>
          <div class="legend-label">1-5 actors</div>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #00ff00;"></div>
          <div class="legend-label">6-15 actors</div>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #ffff00;"></div>
          <div class="legend-label">16-30 actors</div>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #ff8000;"></div>
          <div class="legend-label">31-50 actors</div>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #ff0000;"></div>
          <div class="legend-label">50+ actors</div>
        </div>
      </div>
      
      <!-- Layer Control Panel -->
      <div id="layerControl" class="layer-control">
        <button class="layer-control-toggle" title="Toggle layers">
          <span class="icon">☰</span>
          <span class="text">Layers</span>
        </button>
        <div class="layer-control-panel">
          <div class="layer-control-header">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <h3 style="margin: 0;">Map Layers</h3>
              <div style="display: flex; align-items: center; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 3px; font-size: 10px; color: rgba(131, 136, 141, 0.6); cursor: pointer; white-space: nowrap; margin-top: 2px;" title="Use demo data">
                  <input type="checkbox" id="demoModeToggle" style="margin: 0;">
                  <span>Demo</span>
                </label>
                <button id="layerControlClose" type="button" title="Close layers panel" style="background: transparent; border: none; color: rgba(131, 136, 141, 0.6); font-size: 18px; padding: 0; cursor: pointer; line-height: 1; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;" onmouseover="this.style.color='rgba(131,136,141,1)'" onmouseout="this.style.color='rgba(131,136,141,0.6)'">×</button>
              </div>
            </div>
          </div>
          <div class="layer-control-content">
            <!-- Threat Actors Layer -->
            <div class="layer-item">
              <label>
                <input type="checkbox" id="layerThreatActors">
                <span class="layer-name">Threat Actors</span>
              </label>
              <div id="threatActorsMode" class="layer-mode" style="display: none;">
                <button class="ta-mode-btn active" data-mode="heatmap" title="Heatmap view">Heat</button>
                <button class="ta-mode-btn" data-mode="country" title="Country view">By Country</button>
              </div>
            </div>
            
            <!-- Threat Intel IPs Layer -->
            <div class="layer-item">
              <label>
                <input type="checkbox" id="layerThreatIntel">
                <span class="layer-name">Threat Intel IPs</span>
              </label>
            </div>
            
            <!-- Sign-In Activity Layer -->
            <div class="layer-item">
              <label>
                <input type="checkbox" id="layerSignInActivity">
                <span class="layer-name">Sign-In Activity</span>
              </label>
            </div>
            
            <!-- Device Locations Layer (future) -->
            <div class="layer-item disabled">
              <label>
                <input type="checkbox" id="layerDeviceLocations" disabled>
                <span class="layer-name">Device Locations</span>
              </label>
            </div>
            
            <!-- Weather Radar Layer -->
            <div class="layer-item">
              <label>
                <input type="checkbox" id="layerWeatherRadar">
                <span class="layer-name">Weather Radar</span>
              </label>
            </div>
            
            <!-- Weather Infrared Layer -->
            <div class="layer-item">
              <label>
                <input type="checkbox" id="layerWeatherInfrared">
                <span class="layer-name">Weather Infrared</span>
              </label>
            </div>
            
            <!-- Custom Source Layer -->
            <div class="layer-item">
              <label title="Add custom-source.geojson to blob container">
                <input type="checkbox" id="layerCustomSource">
                <span class="layer-name">Custom Source</span>
              </label>
            </div>
            
            <!-- Drag & Drop Instruction -->
            <div class="layer-note">
              GeoJSON Drag & Drop Supported
            </div>
          </div>
        </div>
      </div>
      
      <div id="map"></div>
    </main>

  </div>

  <!-- App entry point -->
  <script type="module" src="./src/app.js"></script>
  <script>
    // Show under construction warning ONLY if map fails to load config API
    window.addEventListener('DOMContentLoaded', function() {
      document.getElementById('underConstruction').style.display = 'none';
    });
  </script>
</body>
</html>
