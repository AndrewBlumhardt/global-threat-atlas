# Data source configuration for threat intelligence queries
# Each source defines a KQL query against Log Analytics and output settings

# Geo enrichment provider: "maxmind" (full coordinates) or "azure_maps" (country-only)
# MaxMind requires: MAXMIND_LICENSE_KEY from Key Vault or environment variable
# Azure Maps requires: AZURE_MAPS_SUBSCRIPTION_KEY environment variable
geo_provider: "maxmind"  # Options: "maxmind", "azure_maps"

# Key Vault settings (optional - falls back to environment variables)
key_vault_name: ""  # e.g., "kv-sentinel-maps" - leave empty to use env vars

sources:
  - id: signin_activity
    name: "Sign-in Activity"
    enabled: true
    refresh_threshold_hours: 4  # Refresh every 4 hours
    query_time_window_hours: 48  # 2 days lookback
    incremental: false
    incremental_overlap_minutes: 10
    output_filename: "signin-activity.tsv"
    auto_enrich_geo: false  # Already has geo coordinates
    auto_generate_geojson: true  # Generate GeoJSON from results
    kql_query: |
      SigninLogs
      | where TimeGenerated > ago({time_window}h)
      | where IPAddress contains "."
      | extend IsMicrosoftIP = toint(split(IPAddress, ".")[0]) in (13,20,40,52,104)
      | extend Browser = DeviceDetail.browser
      | extend DeviceId = DeviceDetail.deviceId
      | extend isCompliant = DeviceDetail.isCompliant
      | extend isManaged = DeviceDetail.isManaged
      | extend OperatingSystem = DeviceDetail.operatingSystem
      | extend City = LocationDetails.city
      | extend CountryOrRegion = LocationDetails.countryOrRegion
      | extend State = LocationDetails.state
      | extend Latitude = parse_json(tostring(LocationDetails.geoCoordinates)).latitude
      | extend Longitude = parse_json(tostring(LocationDetails.geoCoordinates)).longitude
      | extend RiskReason = parse_json(RiskEventTypes)[0]
      | extend ResourceDisplayName = iif(isempty(ResourceDisplayName), "Unknown", ResourceDisplayName)
      | extend Browser = iif(isempty(Browser), "Unknown", Browser)
      | extend DeviceId = iif(isempty(DeviceId), "Unknown", DeviceId)
      | project
          TimeGenerated,
          UserDisplayName,
          UserPrincipalName,
          IPAddress,
          IsMicrosoftIP,
          ResultSignature,
          ResourceDisplayName,
          Browser,
          OperatingSystem,
          DeviceId,
          isCompliant,
          isManaged,
          ConditionalAccessStatus,
          RiskState,
          RiskReason,
          CountryOrRegion,
          State,
          City,
          Latitude,
          Longitude
      | order by TimeGenerated desc
    columns:
      - TimeGenerated
      - UserDisplayName
      - UserPrincipalName
      - IPAddress
      - IsMicrosoftIP
      - ResultSignature
      - ResourceDisplayName
      - Browser
      - OperatingSystem
      - DeviceId
      - isCompliant
      - isManaged
      - ConditionalAccessStatus
      - RiskState
      - RiskReason
      - CountryOrRegion
      - State
      - City
      - Latitude
      - Longitude

  - id: device_locations
    name: "Device Locations"
    enabled: true
    refresh_threshold_hours: 6  # Refresh every 6 hours
    query_time_window_hours: 48  # 2 days lookback
    incremental: false
    incremental_overlap_minutes: 10
    output_filename: "device-locations.tsv"
    auto_enrich_geo: false  # Already has geo coordinates
    auto_generate_geojson: true  # Generate GeoJSON from results
    kql_query: |
      SigninLogs
      | where TimeGenerated > ago({time_window}h)
      | summarize arg_max(TimeGenerated, *) by DeviceId
      | where isnotempty(DeviceId)
      | extend IsMicrosoftIP = toint(split(IPAddress, ".")[0]) in (13,20,40,52,104)
      | extend Browser = DeviceDetail.browser
      | extend isCompliant = DeviceDetail.isCompliant
      | extend isManaged = DeviceDetail.isManaged
      | extend OperatingSystem = DeviceDetail.operatingSystem
      | extend City = LocationDetails.city
      | extend CountryOrRegion = LocationDetails.countryOrRegion
      | extend State = LocationDetails.state
      | extend Latitude = parse_json(tostring(LocationDetails.geoCoordinates)).latitude
      | extend Longitude = parse_json(tostring(LocationDetails.geoCoordinates)).longitude
      | extend Browser = iif(isempty(Browser), "Unknown", Browser)
      | project
          TimeGenerated,
          DeviceId,
          UserDisplayName,
          UserPrincipalName,
          IPAddress,
          IsMicrosoftIP,
          Browser,
          OperatingSystem,
          isCompliant,
          isManaged,
          CountryOrRegion,
          State,
          City,
          Latitude,
          Longitude
      | order by TimeGenerated desc
    columns:
      - TimeGenerated
      - DeviceId
      - UserDisplayName
      - UserPrincipalName
      - IPAddress
      - IsMicrosoftIP
      - Browser
      - OperatingSystem
      - isCompliant
      - isManaged
      - CountryOrRegion
      - State
      - City
      - Latitude
      - Longitude

  - id: threat_intel_indicators
    name: "Threat Intelligence Indicators"
    enabled: true
    refresh_threshold_hours: 24  # Refresh if file older than this (configurable)
    query_time_window_hours: 360  # 15 days (initial lookback and max refresh window)
    incremental: false  # Always query full 15-day window
    incremental_overlap_minutes: 30
    output_filename: "threat-intel-indicators.tsv"
    auto_enrich_geo: true  # Automatically enrich with geolocation after refresh
    auto_generate_geojson: true  # Automatically generate GeoJSON after geo enrichment
    kql_query: |
      ThreatIntelIndicators
      | where TimeGenerated > ago(15d)
      | extend Description = Data.description
      | extend Type = parse_json(tostring(Data.indicator_types))[0]
      | extend Label = parse_json(tostring(Data.labels))[0]
      | extend Id = tostring(Data.id)
      | summarize arg_max(TimeGenerated, *) by Id
      | summarize arg_max(TimeGenerated, *) by ObservableValue
      | where Pattern contains "network" 
      | project
          TimeGenerated,
          ObservableValue,
          SourceSystem,
          Type,
          Label,
          Confidence,
          Description,
          Created,
          IsActive
      | order by TimeGenerated desc
    columns:
      - TimeGenerated
      - ObservableValue
      - SourceSystem
      - Type
      - Label
      - Confidence
      - Description
      - Created
      - IsActive
      - Latitude
      - Longitude
      - Country
      - City
