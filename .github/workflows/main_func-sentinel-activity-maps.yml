# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - func-sentinel-activity-maps

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/main_func-sentinel-activity-maps.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies into package folder
        run: |
          pip install --target=api/.python_packages/lib/site-packages -r api/requirements.txt
          # Remove azure namespace __init__.py files that conflict when multiple azure-* packages
          # are installed to a --target directory. Python will use implicit namespace resolution instead.
          rm -f api/.python_packages/lib/site-packages/azure/__init__.py
          rm -f api/.python_packages/lib/site-packages/azure/storage/__init__.py

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_39F253D54E704240BBB48EB8FEEEDB6D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7019E05A2F694C20B817B4DC2F993FD2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9F12F2DB8A674FF3A416688A145F4BCE }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-sentinel-activity-maps'
          slot-name: 'Production'
          package: './api'
          scm-do-build-during-deployment: false

