# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - func-sentinel-activity-maps

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'demo_data/**'
      - '.github/workflows/main_func-sentinel-activity-maps.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC login

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Remove WEBSITE_RUN_FROM_PACKAGE blob URL and set local-zip mode
        run: |
          val=$(az webapp config appsettings list \
            --name func-sentinel-activity-maps \
            --resource-group rg-sentinel-activity-maps \
            --query "[?name=='WEBSITE_RUN_FROM_PACKAGE'].value | [0]" -o tsv 2>/dev/null || echo "")
          if [[ "$val" == http* ]]; then
            echo "Replacing blob URL with WEBSITE_RUN_FROM_PACKAGE=1 (local zip mode)"
            az webapp config appsettings set \
              --name func-sentinel-activity-maps \
              --resource-group rg-sentinel-activity-maps \
              --settings WEBSITE_RUN_FROM_PACKAGE=1
          else
            echo "WEBSITE_RUN_FROM_PACKAGE already in local-zip or unset mode — no action needed (value: '$val')"
          fi

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies into package folder
        run: |
          pip install --target=api/.python_packages/lib/site-packages -r api/requirements.txt
          # Azure SDK packages share the 'azure' namespace. pip --target creates
          # __init__.py at the namespace levels (azure/, azure/storage/,
          # azure/monitor/) which makes Python treat them as regular packages and
          # breaks cross-package namespace resolution. Remove only these three
          # namespace-level files; the real module __init__.py files (e.g.
          # azure/storage/blob/__init__.py, azure/identity/__init__.py) must
          # be kept so their classes remain importable.
          rm -f api/.python_packages/lib/site-packages/azure/__init__.py
          rm -f api/.python_packages/lib/site-packages/azure/storage/__init__.py
          rm -f api/.python_packages/lib/site-packages/azure/monitor/__init__.py

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-sentinel-activity-maps'
          slot-name: 'Production'
          package: './api'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false

      - name: Upload demo data to blob storage
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^demo_data/'; then
            echo "demo_data changes detected, uploading..."
            az storage blob upload-batch \
              --account-name sentinelmapsstore \
              --destination datasets/demo_data \
              --source demo_data \
              --overwrite true \
              --auth-mode login
          else
            echo "No demo_data changes, skipping upload."
          fi

